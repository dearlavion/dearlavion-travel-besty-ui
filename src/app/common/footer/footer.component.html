<footer>
  <div class="wrap">
    <div class="foot-row">
      <div class="logo">
        <svg class="mark" width="22" height="27" viewBox="0 0 40 50" aria-hidden="true">
          <defs>
            <mask id="footer-logo-plane-cut">
              <rect width="40" height="50" fill="black" />
              <circle cx="20" cy="18" r="16" fill="white" />
              <path d="M12 12 L30 18 L12 24 L16 18 Z" fill="black" />
            </mask>
          </defs>
          <path d="M20 35 L20 46" stroke="#6b6b6b" stroke-width="3" stroke-linecap="round" />
          <circle cx="20" cy="18" r="16" fill="#ce5886" mask="url(#footer-logo-plane-cut)" />
          <circle cx="20" cy="18" r="16" fill="none" stroke="#e08a8a" stroke-width="1" />
        </svg>
        Travel Besty
      </div>
      <div class="foot-links">
        <div class="foot-col">
          <h4>Shop</h4>
          <a routerLink="/shop">All Kits</a>
          <a routerLink="/shop" [queryParams]="{ destination: 'Beach' }">Beach</a>
          <a routerLink="/shop" [queryParams]="{ destination: 'Mountain' }">Mountain</a>
          <a routerLink="/shop" [queryParams]="{ destination: 'City' }">City</a>
        </div>
        <div class="foot-col">
          <h4>Company</h4>
          <a routerLink="/about">About</a>
          <a href="#">Our Testing Process</a>
          <a href="#">Contact</a>
          <a routerLink="/admin">Admin</a>
        </div>
        <div class="foot-col">
          <h4>Support</h4>
          <a href="#">Shipping</a>
          <a href="#">Returns</a>
          <a href="#">FAQ</a>
        </div>
      </div>
    </div>
    <div class="foot-bottom">{{ tagline }}</div>
  </div>
</footer>
