<nav class="topnav">
  <a class="logo" routerLink="/">
    <svg class="mark" width="22" height="27" viewBox="0 0 40 50" aria-hidden="true">
      <defs>
        <mask id="logo-plane-cut">
          <rect width="40" height="50" fill="black" />
          <circle cx="20" cy="18" r="16" fill="white" />
          <path d="M12 12 L30 18 L12 24 L16 18 Z" fill="black" />
        </mask>
      </defs>
      <path d="M20 35 L20 46" stroke="#6b6b6b" stroke-width="3" stroke-linecap="round" />
      <circle cx="20" cy="18" r="16" fill="#ce5886" mask="url(#logo-plane-cut)" />
      <circle cx="20" cy="18" r="16" fill="none" stroke="#e08a8a" stroke-width="1" />
    </svg>
    Travel Besty
  </a>

  <div class="navlinks">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/travel" routerLinkActive="active">Travel Kits</a>
    <a routerLink="/shop" routerLinkActive="active">Shop</a>
    <a routerLink="/profile" routerLinkActive="active">Profile</a>
    <a routerLink="/about" routerLinkActive="active">About</a>
  </div>

  <div class="nav-actions">
    <a routerLink="/cart" class="cart-link" aria-label="View cart">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path
          d="M3 4h2l2.4 12.2a2 2 0 0 0 2 1.6h7.6a2 2 0 0 0 2-1.6L21 8H6"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <circle cx="10" cy="21" r="1.4" fill="currentColor" />
        <circle cx="18" cy="21" r="1.4" fill="currentColor" />
      </svg>
      @if (cart.itemCount() > 0) {
        <span class="cart-badge">{{ cart.itemCount() }}</span>
      }
    </a>
    @if (authService.token()) {
      <button type="button" class="nav-cta nav-cta-ghost" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login" class="nav-cta nav-cta-ghost">Login</a>
    }
    <a routerLink="/travel" class="nav-cta nav-cta-primary">Build Travel Kit</a>

    <button
      type="button"
      class="menu-toggle"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-label="Toggle menu"
    >
      @if (mobileMenuOpen()) {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      } @else {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      }
    </button>
  </div>

  @if (mobileMenuOpen()) {
    <div class="mobile-menu">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMobileMenu()"
        >Home</a
      >
      <a routerLink="/travel" routerLinkActive="active" (click)="closeMobileMenu()">Travel Kits</a>
      <a routerLink="/shop" routerLinkActive="active" (click)="closeMobileMenu()">Shop</a>
      <a routerLink="/profile" routerLinkActive="active" (click)="closeMobileMenu()">Profile</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()">About</a>
      @if (authService.token()) {
        <button type="button" class="mobile-menu-cta" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="mobile-menu-cta" (click)="closeMobileMenu()">Login</a>
      }
    </div>
  }
</nav>
