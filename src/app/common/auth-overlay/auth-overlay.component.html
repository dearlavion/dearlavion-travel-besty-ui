<div class="overlay-backdrop" (click)="onBackdropClick($event)">
  <div class="overlay-card">
    <a routerLink="/" class="close-btn" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path
          d="M6 6l12 12M18 6L6 18"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </a>

    @if (eyebrow) {
      <p class="overlay-eyebrow">{{ eyebrow }}</p>
    }
    @if (title) {
      <h1 class="overlay-title">{{ title }}</h1>
    }

    <ng-content />
  </div>
</div>
