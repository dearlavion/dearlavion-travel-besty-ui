<app-auth-overlay eyebrow="No worries" title="Reset your password">
  @if (!sent()) {
    <p class="auth-note">
      Tell us the email on your account and we'll send you a link to reset your password.
    </p>

    <form #forgotForm="ngForm" (ngSubmit)="submit(forgotForm)">
      <div class="form-field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="you@example.com"
        />
      </div>

      <button type="submit" class="auth-submit-btn" [disabled]="submitting()">
        {{ submitting() ? 'Sending…' : 'Send Reset Link' }}
      </button>
    </form>
  } @else {
    <div class="success-state">
      <svg width="48" height="48" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="28" fill="var(--tint-lavender)" />
        <path
          d="M18 24l14 11 14-11"
          stroke="var(--color-lavender)"
          stroke-width="4"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
        />
        <rect
          x="18"
          y="20"
          width="28"
          height="20"
          rx="3"
          stroke="var(--color-lavender)"
          stroke-width="3"
          fill="none"
        />
      </svg>
      <p class="auth-note">Check your email — we've sent a reset link to {{ email }}.</p>
    </div>
  }

  <p class="auth-links">Remembered it after all? <a routerLink="/login">Log in</a></p>
</app-auth-overlay>
