<app-auth-overlay eyebrow="Welcome back" title="Log in">
  <form #loginForm="ngForm" (ngSubmit)="submit(loginForm)">
    <div class="form-field">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        email
        placeholder="you@example.com"
      />
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="6"
        placeholder="••••••••"
      />
    </div>

    <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>

    <button type="submit" class="auth-submit-btn" [disabled]="submitting()">
      {{ submitting() ? 'Logging in…' : 'Log In' }}
    </button>
  </form>

  <p class="auth-links">Don't have an account? <a routerLink="/signup">Sign up</a></p>
</app-auth-overlay>
